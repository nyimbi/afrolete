services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: afrolete
      POSTGRES_USER: afrolete
      POSTGRES_PASSWORD: afrolete
    ports:
      - "54329:5432"
    volumes:
      - afrolete-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afrolete -d afrolete"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      AFROLETE_ENV: demo
      AFROLETE_AUTH_MODE: local
      AFROLETE_AUTHZ_MODE: memory
      AFROLETE_DATABASE_URL: postgresql+asyncpg://afrolete:afrolete@postgres:5432/afrolete
      AFROLETE_CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
      AFROLETE_SEED_DEMO: "1"
      AFROLETE_RUN_MIGRATIONS: "1"
      AFROLETE_PERFORMANCE_FORECAST_MODE: deterministic
      AFROLETE_COMMUNICATION_DELIVERY_MODE: record_only
      AFROLETE_AGENT_EXECUTION_MODE: deterministic
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/healthz', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_AFROLETE_API_URL: http://localhost:8000
        NEXT_PUBLIC_AFROLETE_AUTH_MODE: local
    environment:
      NEXT_PUBLIC_AFROLETE_API_URL: http://localhost:8000
      NEXT_PUBLIC_AFROLETE_AUTH_MODE: local
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  due-worker:
    build:
      context: ./backend
    environment:
      AFROLETE_ENV: demo
      AFROLETE_AUTH_MODE: local
      AFROLETE_AUTHZ_MODE: memory
      AFROLETE_DATABASE_URL: postgresql+asyncpg://afrolete:afrolete@postgres:5432/afrolete
      AFROLETE_RUN_MIGRATIONS: "0"
      AFROLETE_SEED_DEMO: "0"
      AFROLETE_PERFORMANCE_FORECAST_MODE: deterministic
      AFROLETE_COMMUNICATION_DELIVERY_MODE: record_only
      AFROLETE_AGENT_EXECUTION_MODE: deterministic
    depends_on:
      backend:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "while true; do python -m app.workers.due --limit 20 --communication-digest-limit 50 --communication-escalation-limit 50 --communication-escalation-channel in_app --communication-escalation-unresolved-after-minutes 15 --communication-escalation-repeat-after-minutes 60 --communication-scheduled-dispatch-limit 50 --compliance-reconciliation-limit 50 --event-travel-consent-reminder-limit 20 --event-travel-consent-reminder-channel in_app --auto-alert-performance-forecast-drift --performance-forecast-drift-channel in_app; sleep 60; done",
      ]

volumes:
  afrolete-postgres:
